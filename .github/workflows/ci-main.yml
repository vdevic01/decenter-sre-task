name: Main Branch CI

run-name: "📦 Main Branch CI"

on:
  push:
    branches:
      - main
    paths:
      - app/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  GHCR_REPOSITORY_NAME: decenter-sre

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Image Metadata
        id: meta
        run: |
          GHCR_REPOSITORY="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${{ env.GHCR_REPOSITORY_NAME }}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          echo "ghcr_repository=${GHCR_REPOSITORY}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ steps.meta.outputs.ghcr_repository }}:${{ steps.meta.outputs.short_sha }}
            ${{ steps.meta.outputs.ghcr_repository }}:latest

      - name: CI summary
        run: |
          echo "📦 CI Summary"
          echo "===================="
          echo "Commit SHA: ${{ github.sha }}"
          echo "Short SHA: ${{ steps.meta.outputs.short_sha }}"
          echo "Image: ${{ steps.meta.outputs.ghcr_repository }}:${{ steps.meta.outputs.short_sha }} and ${{ steps.meta.outputs.ghcr_repository }}:latest"
          echo "===================="
